name = "knock"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# KV namespace ID — substitute at deploy time via your deployment harness.
# See README.md "Deployment" section.
[[kv_namespaces]]
binding = "IP_ALLOWLIST"
id = "REPLACE_KV_NAMESPACE_ID"

# Cron trigger — hourly sync of bypass policy after KV TTL expiry.
[triggers]
crons = ["0 * * * *"]

# Routes — comment out / customize for your zone.
# [[routes]]
# pattern = "knock.example.com/*"
# zone_name = "example.com"

# Runtime secrets (set via `wrangler secret put` — do NOT commit values):
#   CF_API_TOKEN     — CF API token with Zero Trust Edit scope
#   CF_ACCOUNT_ID    — your CF account ID
#   BYPASS_POLICY_ID — UUID of the CF Access bypass policy to update
