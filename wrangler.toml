name = "knock"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# KV ID set after: tofu apply -target cloudflare_workers_kv_namespace.ip_allowlist
# then: tofu state show cloudflare_workers_kv_namespace.ip_allowlist | grep '\bid\b'
[[kv_namespaces]]
binding = "IP_ALLOWLIST"
id = "REPLACE_AFTER_TOFU_APPLY"

# Custom domain — takes precedence over wildcard *.example.com → tunnel CNAME
[[routes]]
pattern = "knock.example.com/*"
zone_name = "example.com"

# Cron trigger — hourly sync of bypass policy after KV TTL expiry
# Managed here (not Tofu) to avoid chicken-and-egg: Worker must exist before
# cloudflare_worker_cron_trigger can reference it, but tofu-apply runs before wrangler deploy.
[triggers]
crons = ["0 * * * *"]

# Secrets managed via `wrangler secret put`:
# CF_API_TOKEN     — Worker runtime token (Zero Trust Edit scope, from 1P: cloudflare.api-token.knock-worker)
# CF_ACCOUNT_ID    — CF account ID
# BYPASS_POLICY_ID — ID of ip_bypass reusable policy (from `tofu output -raw bypass_policy_id`)
