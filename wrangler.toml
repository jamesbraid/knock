name = "knock"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# KV ID set after: tofu apply -target cloudflare_workers_kv_namespace.ip_allowlist
# then: tofu state show cloudflare_workers_kv_namespace.ip_allowlist | grep '\bid\b'
[[kv_namespaces]]
binding = "IP_ALLOWLIST"
id = "REPLACE_AFTER_TOFU_APPLY"

# No [triggers] crons block — cron trigger is managed by Tofu (cloudflare_worker_cron_trigger).
# `wrangler dev --test-scheduled` won't simulate the cron without a [triggers] block; that's acceptable.

# Secrets managed via `wrangler secret put`:
# CF_API_TOKEN     — Worker runtime token (Zero Trust Edit scope, from 1P: cloudflare.api-token.knock-worker)
# CF_ACCOUNT_ID    — CF account ID
# BYPASS_POLICY_ID — ID of ip_bypass reusable policy (from `tofu output -raw bypass_policy_id`)
