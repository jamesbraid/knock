---
# knock CI — build + test + dry-run deploy only. NO deploy credentials here, so
# anyone can fork and run identical CI. Real deploys happen elsewhere, from a
# private harness with secret access.

steps:
  - name: lint
    image: node:20-bookworm-slim
    commands:
      - npm ci
      - npm run lint --if-present
    when:
      event: [push, pull_request]

  - name: test
    image: node:20-bookworm-slim
    commands:
      - npm ci
      - npm test
    when:
      event: [push, pull_request]

  - name: build
    image: node:20-bookworm-slim
    commands:
      - npm ci
      - npx wrangler deploy --dry-run --outdir=dist
    when:
      event: [push, pull_request]

  - name: gitleaks
    image: zricethezav/gitleaks:latest
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
    when:
      event: [push, pull_request, tag]

  - name: publish-mirror
    image: curlimages/curl
    environment:
      SYNC_TOKEN:
        from_secret: forgejo_sync_token
    commands:
      - curl -sf -X POST -H "Authorization: token $SYNC_TOKEN" "$CI_FORGE_URL/api/v1/repos/$CI_REPO/push_mirrors-sync"
      - echo "mirror sync triggered"
    when:
      - event: push
        branch: main
      - event: tag
