---
# knock CI — build + test + secret-scan only. NO deploy or publish credentials
# here, so anyone can fork and run identical CI. Releases and mirroring happen
# from a separate private harness.

steps:
  - name: lint
    image: node:20-bookworm-slim
    commands:
      - npm ci
      - npm run lint --if-present
    when:
      event: [push, pull_request, manual]

  - name: test
    image: node:20-bookworm-slim
    commands:
      - npm ci
      - npm test
    when:
      event: [push, pull_request, manual]

  - name: build
    image: node:20-bookworm-slim
    commands:
      - npm ci
      - npx wrangler deploy --dry-run --outdir=dist
    when:
      event: [push, pull_request, manual]

  - name: go-test
    image: golang:1.22-bookworm
    commands:
      - go vet ./...
      - go test -race ./...
    when:
      event: [push, pull_request, manual]

  - name: go-build
    image: golang:1.22-bookworm
    commands:
      - go build ./cmd/knock
    when:
      event: [push, pull_request, manual]

  - name: tofu-validate
    image: ghcr.io/opentofu/opentofu:1.8
    commands:
      - cd deploy
      - tofu fmt -check
      - tofu init -backend=false
      - tofu validate
    when:
      event: [push, pull_request, manual]

  - name: gitleaks
    image: zricethezav/gitleaks:latest
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
    when:
      event: [push, pull_request, tag, manual]
